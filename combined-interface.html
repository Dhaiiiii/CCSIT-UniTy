<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Communities</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- HEADER -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">CCSIT <span>UniTy</span></div>

        <nav class="nav">
          <a href="./index.html" class="nav-link">Home</a>
          <a href="./combined-interface.html" class="nav-link active">Communities</a>
          <a href="./map.html" class="nav-link">Campus Map</a>
          <a href="./profile.html" class="nav-link">Profile</a>
        </nav>
      </div>
    </header>

    <!-- MAIN -->
    <main class="page-container">
      <div class="container main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>My Communities</h2>
                <button id="createCommunityBtn" class="btn-icon" title="Create Community">+</button>
            </div>
            <div id="communitiesList" class="communities-list">
                <!-- Communities will be loaded here -->
            </div>
            <button id="joinCommunityBtn" class="btn-primary btn-full">Join Community</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="communityView" class="community-view">
                <div class="community-header">
                    <div class="community-info">
                        <h2 id="communityName">Select a Community</h2>
                        <p id="communityDescription"></p>
                        <div class="community-stats">
                            <span id="memberCount"></span>
                            <span id="postCount"></span>
                        </div>
                    </div>
                    <div class="community-actions">
                        <button id="createPostBtn" class="btn-primary">Create Post</button>
                        <button id="manageMembersBtn" class="btn-secondary" style="display:none;">Manage Members</button>
                        <button id="viewReportsBtn" class="btn-warning" style="display:none;">View Reports</button>
                    </div>
                </div>

                <!-- Community Discovery Section -->
                <div id="discoverySection" class="discovery-section" style="display:none;">
                    <div class="discovery-header">
                        <h3>Discover Communities</h3>
                        <button id="toggleDiscoveryBtn" class="toggle-discovery-btn">Hide Discovery</button>
                    </div>

                    <div class="discovery-filters">
                        <input
                            type="text"
                            id="discoverySearch"
                            class="discovery-search"
                            placeholder="Search communities..."
                        />
                        <select id="discoveryTypeFilter" class="discovery-select">
                            <option value="">All types</option>
                            <option value="academic">Academic</option>
                            <option value="club">Clubs & Activities</option>
                            <option value="support">Support & Help</option>
                            <option value="projects">Projects</option>
                            <option value="general">General</option>
                        </select>
                        <select id="discoverySortFilter" class="discovery-select">
                            <option value="active">Most Active</option>
                            <option value="newest">Newest</option>
                            <option value="alphabetical">Alphabetical</option>
                        </select>
                    </div>

                    <div id="discoveryGrid" class="discovery-grid">
                        <!-- Discovery cards will be loaded here -->
                    </div>
                </div>

                <!-- Post Type Selector -->
                <div id="postTypeSelector" class="post-type-selector" style="display:none;">
                    <button class="post-type-btn active" data-type="discussion">Discussion</button>
                    <button class="post-type-btn" data-type="question">Question</button>
                    <button id="showDiscoveryBtn" class="toggle-discovery-btn" style="margin-left: auto;">Browse Communities</button>
                </div>

                <!-- Posts Feed -->
                <div id="postsFeed" class="posts-feed">
                    <p class="empty-state">Select a community to view posts</p>
                </div>
            </div>
        </main>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      © 2025 CCSIT UniTy Team
    </footer>
  </div>

    <!-- Modal: Create Community -->
    <div id="createCommunityModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Community</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Community Name</label>
                    <input type="text" id="newCommunityName" placeholder="e.g., Computer Science Students">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="newCommunityDescription" placeholder="Describe your community..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('createCommunityModal')">Cancel</button>
                <button class="btn-primary" id="submitCommunityBtn">Create</button>
            </div>
        </div>
    </div>

    <!-- Modal: Join Community -->
    <div id="joinCommunityModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Join a Community</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="availableCommunitiesList" class="available-communities">
                    <!-- Available communities will be loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('joinCommunityModal')">Close</button>
            </div>
        </div>
    </div>

    <!-- Modal: Create Post -->
    <div id="createPostModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="postModalTitle">Create Post</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Post Type</label>
                    <select id="postType">
                        <option value="discussion">Discussion</option>
                        <option value="question">Question</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="postTitle" placeholder="Enter post title">
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="postContent" placeholder="Write your post content..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('createPostModal')">Cancel</button>
                <button class="btn-primary" id="submitPostBtn">Post</button>
            </div>
        </div>
    </div>

    <!-- Modal: Manage Members -->
    <div id="manageMembersModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Manage Members</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="membersList" class="members-list">
                    <!-- Members will be loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('manageMembersModal')">Close</button>
            </div>
        </div>
    </div>

    <!-- Modal: Post Details -->
    <div id="postDetailsModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>Post Details</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="postDetailsContent">
                    <!-- Post details will be loaded here -->
                </div>
                <div class="replies-section">
                    <h4>Replies</h4>
                    <div class="reply-form">
                        <textarea id="replyContent" placeholder="Write your reply..."></textarea>
                        <button class="btn-primary" id="submitReplyBtn">Reply</button>
                    </div>
                    <div id="repliesList" class="replies-list">
                        <!-- Replies will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Report Content -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Report Content</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Reason for reporting</label>
                    <select id="reportReason">
                        <option value="spam">Spam</option>
                        <option value="harassment">Harassment</option>
                        <option value="inappropriate">Inappropriate Content</option>
                        <option value="misinformation">Misinformation</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Additional Details (Optional)</label>
                    <textarea id="reportDetails" placeholder="Provide more information..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('reportModal')">Cancel</button>
                <button class="btn-primary" id="submitReportBtn">Submit Report</button>
            </div>
        </div>
    </div>

    <!-- Modal: View Reports (Moderator Only) -->
    <div id="viewReportsModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>Content Reports</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="reportsList" class="reports-list">
                    <!-- Reports will be loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('viewReportsModal')">Close</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // Extended functionality for community discovery
        (function() {
            let discoveryVisible = false;
            let allCommunities = [];
            let filteredCommunities = [];

            // Initialize discovery functionality
            function initDiscovery() {
                const showDiscoveryBtn = document.getElementById('showDiscoveryBtn');
                const toggleDiscoveryBtn = document.getElementById('toggleDiscoveryBtn');
                const discoverySection = document.getElementById('discoverySection');
                const discoverySearch = document.getElementById('discoverySearch');
                const discoveryTypeFilter = document.getElementById('discoveryTypeFilter');
                const discoverySortFilter = document.getElementById('discoverySortFilter');

                if (showDiscoveryBtn) {
                    showDiscoveryBtn.addEventListener('click', () => {
                        toggleDiscovery(true);
                    });
                }

                if (toggleDiscoveryBtn) {
                    toggleDiscoveryBtn.addEventListener('click', () => {
                        toggleDiscovery(false);
                    });
                }

                if (discoverySearch) {
                    discoverySearch.addEventListener('input', applyDiscoveryFilters);
                }

                if (discoveryTypeFilter) {
                    discoveryTypeFilter.addEventListener('change', applyDiscoveryFilters);
                }

                if (discoverySortFilter) {
                    discoverySortFilter.addEventListener('change', applyDiscoveryFilters);
                }

                loadDiscoveryCommunities();
            }

            function toggleDiscovery(show) {
                discoveryVisible = show;
                const discoverySection = document.getElementById('discoverySection');
                const showDiscoveryBtn = document.getElementById('showDiscoveryBtn');
                
                if (discoverySection) {
                    discoverySection.style.display = show ? 'block' : 'none';
                }
                
                if (showDiscoveryBtn) {
                    showDiscoveryBtn.textContent = show ? 'Hide Discovery' : 'Browse Communities';
                }

                if (show) {
                    loadDiscoveryCommunities();
                }
            }

            function loadDiscoveryCommunities() {
                const user = dataManager.getCurrentUser();
                const communities = dataManager.getCommunities();
                
                allCommunities = communities.map(c => ({
                    ...c,
                    isJoined: user.joinedCommunities?.includes(c.id) || false,
                    type: getRandomType(),
                    activeThreads: Math.floor(Math.random() * 15) + 1
                }));

                applyDiscoveryFilters();
            }

            function getRandomType() {
                const types = ['academic', 'club', 'support', 'projects', 'general'];
                return types[Math.floor(Math.random() * types.length)];
            }

            function applyDiscoveryFilters() {
                const searchTerm = document.getElementById('discoverySearch')?.value.toLowerCase() || '';
                const typeFilter = document.getElementById('discoveryTypeFilter')?.value || '';
                const sortFilter = document.getElementById('discoverySortFilter')?.value || 'active';

                // Filter
                filteredCommunities = allCommunities.filter(c => {
                    const matchesSearch = c.name.toLowerCase().includes(searchTerm) || 
                                        c.description.toLowerCase().includes(searchTerm);
                    const matchesType = !typeFilter || c.type === typeFilter;
                    return matchesSearch && matchesType;
                });

                // Sort
                switch(sortFilter) {
                    case 'newest':
                        filteredCommunities.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                        break;
                    case 'alphabetical':
                        filteredCommunities.sort((a, b) => a.name.localeCompare(b.name));
                        break;
                    case 'active':
                    default:
                        filteredCommunities.sort((a, b) => b.activeThreads - a.activeThreads);
                        break;
                }

                renderDiscoveryCommunities();
            }

            function renderDiscoveryCommunities() {
                const container = document.getElementById('discoveryGrid');
                if (!container) return;

                container.innerHTML = '';

                if (filteredCommunities.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem; grid-column: 1/-1;">No communities found matching your filters.</p>';
                    return;
                }

                filteredCommunities.forEach(community => {
                    const card = document.createElement('div');
                    card.className = 'discovery-card';
                    
                    const typeLabel = community.type.charAt(0).toUpperCase() + community.type.slice(1);
                    
                    card.innerHTML = `
                        <div class="discovery-card-header">
                            <div class="discovery-card-title">${community.name}</div>
                            <div class="discovery-card-meta">
                                <span>${community.members.length} members</span>
                                <span>•</span>
                                <span>${community.activeThreads} active threads</span>
                                <span class="discovery-card-type">${typeLabel}</span>
                            </div>
                        </div>
                        <p class="discovery-card-description">${community.description}</p>
                        <div class="discovery-card-footer">
                            <a href="#" class="discovery-view-link" data-community-id="${community.id}">View community →</a>
                            ${community.isJoined 
                                ? '<button class="btn-secondary btn-small" disabled>Joined</button>'
                                : `<button class="btn-primary btn-small" data-join-id="${community.id}">Join</button>`
                            }
                        </div>
                    `;

                    // View community link
                    const viewLink = card.querySelector('.discovery-view-link');
                    if (viewLink) {
                        viewLink.addEventListener('click', (e) => {
                            e.preventDefault();
                            if (community.isJoined) {
                                selectCommunity(community.id);
                                toggleDiscovery(false);
                            } else {
                                alert('Please join this community first to view its content.');
                            }
                        });
                    }

                    // Join button
                    const joinBtn = card.querySelector(`[data-join-id="${community.id}"]`);
                    if (joinBtn) {
                        joinBtn.addEventListener('click', () => {
                            joinCommunityFromDiscovery(community.id);
                        });
                    }

                    container.appendChild(card);
                });
            }

            function joinCommunityFromDiscovery(communityId) {
                joinCommunity(communityId);
                loadDiscoveryCommunities();
            }

            // Initialize when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initDiscovery);
            } else {
                initDiscovery();
            }
        })();
    </script>
</body>
</html>
