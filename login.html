<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CCSIT UniTy – Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f14;
      --fg: #e8eef5;
      --muted: #a9b4c2;
      --brand: #7cc4ff;
      --card: #121821;
      --outline: #223045;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", sans-serif;
      background-color: var(--bg);
      color: var(--fg);
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      border-bottom: 1px solid var(--outline);
      background: var(--bg);
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: .04em;
    }

    .logo span { color: var(--brand); }

    .nav {
      display: flex;
      gap: 12px;
      font-size: .9rem;
    }

    .nav-link {
      color: var(--fg);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 999px;
      transition: background .15s ease, color .15s ease;
    }

    .nav-link:hover {
      background: #0f1723;
      color: #ffffff;
    }

    .nav-link.active {
      background: var(--brand);
      color: #020617;
      font-weight: 600;
    }

    /* PAGE */
    .page-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 18px;
      border: 1px solid var(--outline);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      padding: 26px 24px 28px;
    }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .auth-subtitle {
      font-size: .92rem;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .form-field {
      margin-bottom: 14px;
    }

    .form-label {
      font-size: .85rem;
      margin-bottom: 4px;
      color: var(--muted);
      display: block;
    }

    .form-input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--outline);
      background: #020617;
      color: var(--fg);
      font-size: .9rem;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .form-input::placeholder {
      color: #6b7280;
    }

    .form-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 1px rgba(124,196,255,0.35);
    }

    .field-error {
      margin-top: 4px;
      font-size: .8rem;
      color: var(--danger);
      display: none;
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
      margin-bottom: 8px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .8rem;
      color: var(--muted);
    }

    .remember input {
      accent-color: var(--brand);
    }

    .link-small {
      font-size: .8rem;
      color: var(--brand);
      text-decoration: none;
    }

    .link-small:hover {
      text-decoration: underline;
    }

    .btn-primary {
      width: 100%;
      margin-top: 10px;
      padding: 9px 14px;
      border-radius: 999px;
      border: none;
      background: var(--brand);
      color: #020617;
      font-weight: 600;
      font-size: .95rem;
      cursor: pointer;
      box-shadow: 0 14px 32px rgba(124,196,255,.55);
      transition: background .15s ease, box-shadow .15s ease, transform .08s ease;
    }

    .btn-primary:hover {
      background: #9ad7ff;
      box-shadow: 0 18px 38px rgba(124,196,255,.7);
    }

    .btn-primary:active {
      transform: scale(.98);
    }

    .auth-footer {
      margin-top: 14px;
      font-size: .85rem;
      color: var(--muted);
      text-align: center;
    }

    .auth-footer a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover { text-decoration: underline; }

    .form-global-error {
      margin-top: 8px;
      font-size: .85rem;
      color: var(--danger);
      display: none;
    }

    .footer {
      border-top: 1px solid var(--outline);
      color: var(--muted);
      padding: 18px;
      text-align: center;
      font-size: .8rem;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">CCSIT <span>UniTy</span></div>

      </div>
    </header>

    <!-- MAIN -->
    <main class="page-container">
      <section class="auth-card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your CCSIT UniTy account.</p>

        <form id="loginForm">
          <div class="form-field">
            <label for="loginEmail" class="form-label">University email</label>
            <input
              id="loginEmail"
              type="email"
              class="form-input"
              placeholder="example@ccsit.edu.sa"
            />
            <div class="field-error" id="emailError">Please enter a valid CCSIT email.</div>
          </div>

          <div class="form-field">
            <label for="loginPassword" class="form-label">Password</label>
            <input
              id="loginPassword"
              type="password"
              class="form-input"
              placeholder="Enter your password"
            />
            <div class="field-error" id="passwordError">Password is required.</div>
          </div>

          <div class="form-row">
            <label class="remember">
              <input type="checkbox" id="rememberMe" />
              <span>Remember me</span>
            </label>

            <a href="forgot-password.html" class="link-small">
              Forgot password?
            </a>
          </div>

          <button type="submit" class="btn-primary">Login</button>

          <div class="form-global-error" id="loginGlobalError">
            Invalid email or password (demo validation).
          </div>
        </form>

        <div class="auth-footer">
          Don’t have an account?
          <a href="signup.html">Sign up</a>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      © 2025 CCSIT UniTy Team — Student Project
    </footer>
  </div>
<script>
  const loginForm = document.getElementById('loginForm');
  const emailInput = document.getElementById('loginEmail');
  const passwordInput = document.getElementById('loginPassword');
  const emailError = document.getElementById('emailError');
  const passwordError = document.getElementById('passwordError');
  const globalError = document.getElementById('loginGlobalError');

  function isCCSITEmail(value) {
    return /@.+\./.test(value); // ممكن تشددها لـ /@ccsit\.edu\.sa$/ لو حبيت
  }

  loginForm.addEventListener('submit', async function (e) {
    e.preventDefault();
    let valid = true;

    emailError.style.display = 'none';
    passwordError.style.display = 'none';
    globalError.style.display = 'none';

    if (!emailInput.value || !isCCSITEmail(emailInput.value)) {
      emailError.style.display = 'block';
      valid = false;
    }

    if (!passwordInput.value) {
      passwordError.style.display = 'block';
      valid = false;
    }

    if (!valid) return;

    try {
      // 🔗 هنا نرسل البيانات لملف الـ PHP
      const res = await fetch('http://localhost/ccsit_unity/login.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams({
          email: emailInput.value,
          password: passwordInput.value
        })
      });

      const text = await res.text();
      console.log('Response from server:', text);

      if (text.trim() === 'SUCCESS') {
        // تسجيل دخول ناجح
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = 'index.html'; // يوديك على الصفحة الثانية
      } else if (text.trim() === 'INVALID') {
        globalError.textContent = 'Invalid email or password.';
        globalError.style.display = 'block';
      } else {
        globalError.textContent = 'Server error, please try again later.';
        globalError.style.display = 'block';
      }
    } catch (err) {
      console.error(err);
      globalError.textContent = 'Cannot connect to server.';
      globalError.style.display = 'block';
    }
  });
</script>




</body>
</html>
