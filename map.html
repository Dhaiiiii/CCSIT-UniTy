<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCSIT UniTy — Campus Map</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="site-header">
    <div class="brand">CCSIT <span>UniTy</span></div>
    <button class="menu-toggle" aria-label="Toggle menu">☰</button>
    <nav class="site-nav" id="nav">
      <a href="index.html">Home</a>
      <a href="qa.html">Q&amp;A</a>
      <a href="map.html">Campus Map</a>
      <a href="clubs.html">Clubs</a>
    </nav>
  </header>

  <main class="container">
    <h1>Campus Map</h1>
    <p class="muted">Google Maps page of The CCSIT Campus and it Facilities.</p>

    <!-- Map container -->
    <div id="map" style="width:100%; height:500px;"></div>

    <!-- Search box (pins only) -->
    <input id="pac-input" class="controls" type="text" placeholder="Search facilities (pins only)" style="margin-top:10px; width:100%; padding:8px;">

    <!-- Floor filter -->
    <select id="floor-filter" style="margin-top:10px; width:100%; padding:8px;">
      <option value="all">All pins</option>
      <option value="F_up">Building F — Upstairs</option>
      <option value="F_down">Building F — Downstairs</option>
      <option value="C_up">Building C — Upstairs</option>
      <option value="C_down">Building C — Downstairs</option>
      <option value="College_down">College Entrance Building</option>
    </select>

    </select>

    <!-- Search suggestions -->
    <ul id="search-results" style="list-style:none; padding-left:0; margin-top:8px;"></ul>
  </main>

  <footer class="site-footer">
    <p>© 2025 CCSIT UniTy Team</p>
  </footer>

  <!-- Google Maps API -->
  <script>
    function initMap() {
      var campus = { lat: 26.3850339, lng: 50.1890220 };

      var map = new google.maps.Map(document.getElementById("map"), {
        zoom: 17,
        center: campus,
      });

      // Directions service + renderer
      var directionsService = new google.maps.DirectionsService();
      var directionsRenderer = new google.maps.DirectionsRenderer({ suppressMarkers: true });
      directionsRenderer.setMap(map);

      // Facilities (grouped with floor tags)
      var facilities = [
  // Building F Downstairs
  {name:"Building F Entrance", lat:26.3853499, lng:50.1897080, group:"F_down"},
  {name:"Building Side Entrance", lat:26.3857599, lng:50.1896969, group:"F_down"},
  {name:"Building Side Entrance", lat:26.3851291, lng:50.1900919, group:"F_down"},
  {name:"Toilet", lat:26.3855649, lng:50.1899551, group:"F_down"},
  {name:"Stairs", lat:26.3855911, lng:50.1899551, group:"F_down"},
  {name:"Stairs", lat:26.3852691, lng:50.1901821, group:"F_down"},
  {name:"Stairs", lat:26.3857671, lng:50.1898860, group:"F_down"},
  {name:"Elevator", lat:26.3855190, lng:50.1899380, group:"F_down"},
  {name:"Faculty Members Room", lat:26.3851009, lng:50.1899340, group:"F_down"},
  {name:"Administration Room", lat:26.3851721, lng:50.1898941, group:"F_down"},
  {name:"College Administration", lat:26.3852910, lng:50.1901459, group:"F_down"},

  // Building F Upstairs
  {name:"Toilet", lat:26.3855649, lng:50.1899551, group:"F_up"},
  {name:"Stairs", lat:26.3855911, lng:50.1899551, group:"F_up"},
  {name:"Stairs", lat:26.3852691, lng:50.1901821, group:"F_up"},
  {name:"Stairs", lat:26.3857671, lng:50.1898860, group:"F_up"},
  {name:"Elevator", lat:26.3855190, lng:50.1899380, group:"F_up"},
  {name:"Mini-Market", lat:26.3856610, lng:50.1896041, group:"F_up"},
  {name:"Events Room", lat:26.3857100, lng:50.1898699, group:"F_up"},
  {name:"Faculty Members Room", lat:26.3853210, lng:50.1901160, group:"F_up"},
  {name:"Examination Unit", lat:26.3853069, lng:50.1901311, group:"F_up"},
  {name:"Administration Room", lat:26.3852931, lng:50.1901412, group:"F_up"},
  {name:"Events Unit", lat:26.3851171, lng:50.1900349, group:"F_up"},
  {name:"Faculty Members Room", lat:26.3851129, lng:50.1899209, group:"F_up"},
  {name:"Faculty Members Room", lat:26.3851640, lng:50.1898870, group:"F_up"},
  {name:"Faculty Members Room", lat:26.3852021, lng:50.1898619, group:"F_up"},

  // Building C Downstairs
  {name:"Building C Entrance", lat:26.3856100, lng:50.1892289, group:"C_down"},
  {name:"Building Side Entrance", lat:26.3859509, lng:50.1894770, group:"C_down"},
  {name:"Building Side Entrance", lat:26.3855971, lng:50.1887689, group:"C_down"},
  {name:"Toilet", lat:26.3858569, lng:50.1890321, group:"C_down"},
  {name:"Stairs", lat:26.3858530, lng:50.1890029, group:"C_down"},
  {name:"Stairs", lat:26.3860359, lng:50.1893181, group:"C_down"},
  {name:"Stairs", lat:26.3857671, lng:50.1887850, group:"C_down"},
  {name:"Elevator", lat:26.3858310, lng:50.1890629, group:"C_down"},
  {name:"Prayer Room", lat:26.3857749, lng:50.1888621, group:"C_down"},
  {name:"Faculty Members Room", lat:26.3857671, lng:50.1894619, group:"C_down"},
  {name:"Faculty Members Room", lat:26.3857451, lng:50.1894099, group:"C_down"},
  {name:"Departments Administration Room", lat:26.3859830, lng:50.1892611, group:"C_down"},
  {name:"Multipurpose Room", lat:26.3857719, lng:50.1888309, group:"C_down"},
  {name:"Theater/Stage Room", lat:26.3855241, lng:50.1889741, group:"C_down"},

  // Building C Upstairs
  {name:"Toilet", lat:26.3858569, lng:50.1890321, group:"C_up"},
  {name:"Stairs", lat:26.3858530, lng:50.1890029, group:"C_up"},
  {name:"Stairs", lat:26.3860359, lng:50.1893181, group:"C_up"},
  {name:"Stairs", lat:26.3857671, lng:50.1887850, group:"C_up"},
  {name:"Elevator", lat:26.3858310, lng:50.1890629, group:"C_up"},
  {name:"Mini-Market", lat:26.3855391, lng:50.1888661, group:"C_up"},
  {name:"Study Room", lat:26.3857641, lng:50.1888390, group:"C_up"},
  {name:"Administration Room", lat:26.3857821, lng:50.1888681, group:"C_up"},
  {name:"Faculty Members Room", lat:26.3857761, lng:50.1894569, group:"C_up"},
  {name:"Faculty Members Room", lat:26.3857629, lng:50.1894331, group:"C_up"},
  {name:"Administration Room", lat:26.3859710, lng:50.1892349, group:"C_up"},
  {name:"Administration Room", lat:26.3859929, lng:50.1892869, group:"C_up"},

  // College Entrance Building (Downstairs/Ground Floor only)
  {name:"College Entrance", lat:26.3849970, lng:50.1889409, group:"College_down"},
  {name:"College Entrance", lat:26.3850781, lng:50.1891990, group:"College_down"},
  {name:"Toilet", lat:26.3849711, lng:50.1891940, group:"College_down"},
  {name:"Prayer Room", lat:26.3850850, lng:50.1889509, group:"College_down"},
  {name:"Vending Machine", lat:26.3850790, lng:50.1890039, group:"College_down"}
  ];

      // Marker icons (optional minimal differentiation)
      var iconColors = {
        F_up: "red",
        F_down: "orange",
        C_up: "blue",
        C_down: "green",
        College_down: "purple"
      };
      function pinIcon(color) {
        return {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: color,
          fillOpacity: 0.9,
          strokeColor: "#222",
          strokeWeight: 1,
          scale: 6
        };
      }

      // Create markers
      var markers = facilities.map(function(place) {
        var marker = new google.maps.Marker({
          position: {lat: place.lat, lng: place.lng},
          map: map,
          title: place.name,
          icon: pinIcon(iconColors[place.group] || "red"),
        });
        marker._group = place.group;
        marker._name = place.name;
        marker._latlng = new google.maps.LatLng(place.lat, place.lng);

        var infowindow = new google.maps.InfoWindow({
          content: "<b>" + place.name + "</b><br><small>" + labelForGroup(place.group) + "</small>"
        });
        marker.addListener("click", function() {
          infowindow.open(map, marker);
        });
        return marker;
      });

      function labelForGroup(g) {
        if (g === "F_up") return "Building F — Upstairs";
        if (g === "F_down") return "Building F — Downstairs";
        if (g === "C_up") return "Building C — Upstairs";
        if (g === "C_down") return "Building C — Downstairs";
        if (g === "College_down") return "College Entrance Building";
        return "Unknown";
      }

      // Floor filter: show/hide markers
      var filterEl = document.getElementById("floor-filter");
      filterEl.addEventListener("change", function() {
        var val = filterEl.value;
        markers.forEach(function(m) {
          var show = (val === "all") || (m._group === val);
          m.setVisible(show);
        });
      });

      // Pins-only search: live suggestions + focus on marker
      var searchInput = document.getElementById("pac-input");
      var resultsEl = document.getElementById("search-results");

      function currentFilter() {
        var v = filterEl.value;
        return v === "all" ? null : v;
      }

      searchInput.addEventListener("input", function() {
        var q = searchInput.value.trim().toLowerCase();
        resultsEl.innerHTML = "";
        if (!q) return;

        var groupFilter = currentFilter();
        var matches = markers
          .filter(function(m) {
            var nameMatch = m._name.toLowerCase().includes(q);
            var groupMatch = !groupFilter || m._group === groupFilter;
            return nameMatch && groupMatch;
          })
          .slice(0, 8); // limit suggestions

        matches.forEach(function(m) {
          var li = document.createElement("li");
          li.style.cursor = "pointer";
          li.style.padding = "6px 8px";
          li.style.border = "1px solid #eee";
          li.style.marginBottom = "4px";
          li.textContent = m._name + " — " + labelForGroup(m._group);
          li.addEventListener("click", function() {
            // Focus map on marker and open info
            map.panTo(m._latlng);
            map.setZoom(19);
            new google.maps.InfoWindow({
              content: "<b>" + m._name + "</b><br><small>" + labelForGroup(m._group) + "</small>"
            }).open(map, m);
            resultsEl.innerHTML = "";
          });
          resultsEl.appendChild(li);
        });
      });

      // Directions: double-click two markers
      var selected = [];
      markers.forEach(function(marker) {
        marker.addListener("dblclick", function() {
          selected.push(marker._latlng);
          if (selected.length === 2) {
            directionsService.route({
              origin: selected[0],
              destination: selected[1],
              travelMode: google.maps.TravelMode.WALKING
            }, function(response, status) {
              if (status === "OK") {
                directionsRenderer.setDirections(response);
              } else {
                console.warn("Directions failed:", status);
              }
            });
            selected = [];
          }
        });
      });
    }
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDcH0wUt-ztfBrzEaWgbwDZNOlm1SUnACQ&callback=initMap"
    async defer>
  </script>
</body>
</html>
