<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCSIT UniTy — Campus Map</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="site-header">
    <div class="brand">CCSIT <span>UniTy</span></div>
    <button class="menu-toggle" aria-label="Toggle menu">☰</button>
    <nav class="site-nav" id="nav">
      <a href="index.html">Home</a>
      <a href="qa.html">Q&amp;A</a>
      <a href="map.html">Campus Map</a>
      <a href="clubs.html">Clubs</a>
    </nav>
  </header>

  <main class="container">
    <h1>Campus Map</h1>
    <p class="muted">Prototype page — Google Maps integration.</p>

    <!-- Map container -->
    <div id="map" style="width:100%; height:500px;"></div>
  </main>

  <footer class="site-footer">
    <p>© 2025 CCSIT UniTy Team</p>
  </footer>

  <!-- Google Maps API -->
  <script>
    function initMap() {
      // Coordinates for CCSIT Female Campus
      var campus = { lat: 26.3850339, lng: 50.1890220 };

      // Create map centered on campus
      var map = new google.maps.Map(document.getElementById("map"), {
        zoom: 16,
        center: campus,
      });

      // Add a pin (marker) at the campus coordinates
      new google.maps.Marker({
        position: campus,
        map: map,
        title: "CCSIT Female Campus"
      });
    }
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDcH0wUt-ztfBrzEaWgbwDZNOlm1SUnACQ&callback=initMap"
    async defer>
  </script>
</body>
</html>
